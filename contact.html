<!DOCTYPE html>
<html>
<head>
    <title>Contact - MainCrafts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">MainCrafts</div>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<section class="features">
    <h2>Contact Us</h2>

    <form name="contactForm" onsubmit="return validateForm()"
          style="max-width:500px;margin:auto;display:flex;flex-direction:column;gap:15px;">

        <input type="text" name="name" placeholder="Enter your name" style="padding:12px;">

        <input type="email" name="email" placeholder="Enter your email" style="padding:12px;">

        <textarea name="message" placeholder="Enter your message" rows="5" style="padding:12px;"></textarea>

        <button type="submit" class="btn">
            Send Message
        </button>

    </form>
</section>

<footer>
    <p>© 2025 MainCrafts Technology</p>
</footer>

<script src="script.js"></script>

</body>
</html>
